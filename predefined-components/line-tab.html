<!-- ============================================================
     LINE TAB — Predefined HTML Template
     Captured from Figma Elegant Components 1.0 via MCP
     Component Set: Line Tab (529:18726)

     VARIANTS (set via class modifier on .line-tab):
       Default        → .line-tab                     (plain text tabs, h=40)
       Icon variant   → .line-tab.line-tab--with-icon (icon + text, h=40)
       QuickLink      → .line-tab.line-tab--quicklink (pill tabs, h=32)

     BOOLEANS (show/hide via presence of elements):
       Checkbox       → Add .line-tab__checkbox inside each .line-tab__header
       Settings Icon  → Add .line-tab__settings inside each .line-tab__header
       Pagination     → Add .line-tab__pagination after .line-tab__headers
       Dashboard Settings → Add .line-tab__dashboard-settings after headers
       Right Actions  → Add .line-tab__actions (Variant 4 dashboard)

     TAB SWITCHING:
       line-tab.js reads data-tab on each header and shows matching
       .line-tab__content[data-tab-content] in .line-tab__body

     USAGE:
       1. Copy the variant you need below
       2. Set tab labels (text inside .line-tab__header)
       3. Set data-tab="tabname" on each header
       4. Set data-tab-content="tabname" on each body panel
       5. Add --selected to the default active tab header
       6. Add --active to the default visible body panel
     ============================================================ -->

<!-- ═══════════════════════════════════════════════════════════

    <button class="line-tab__header line-tab__header--selected" data-tab="tab1">Tab Label 1</button>
    <button class="line-tab__header line-tab__header--unselected" data-tab="tab2">Tab Label 2</button>
    <button class="line-tab__header line-tab__header--unselected" data-tab="tab3">Tab Label 3</button>
  </div>
