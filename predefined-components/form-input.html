<!-- ============================================================
     FORM INPUT — Predefined HTML Templates
     All form input types from Figma "Textbox with Label" component
     ════════════════════════════════════════════════════════════

       Default = 280px  →  class="form-row__input" (or form-row__input--default)

       Small   = 100px  →  class="form-row__input form-row__input--small"
     ============================================================ -->
